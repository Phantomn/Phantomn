name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROFILE_USERNAME: Phantomn
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate profile cards
        run: python .github/scripts/generate_profile_cards.py

      - name: Fetch official streak card
        shell: bash
        run: |
          set -euo pipefail
          tmp="profile/streak.svg.tmp"
          if curl -fsSL --retry 5 --retry-delay 5 \
            "https://streak-stats.demolab.com/?user=Phantomn&theme=blue-green&hide_border=true" \
            -o "$tmp"; then
            mv "$tmp" profile/streak.svg
          else
            rm -f "$tmp"
            echo "Keeping existing streak.svg"
          fi

      - name: Commit generated cards
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update profile cards" || exit 0
          git push
